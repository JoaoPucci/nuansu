pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm typecheck
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm exec eslint {staged_files}
    format:
      glob: "*.{ts,tsx,js,jsx,json,md,css,html,yml,yaml}"
      run: pnpm exec prettier --check {staged_files}
    unit:
      # Sub-30s feedback loop per docs/quality.md §8.
      # Runs only the vitest tests reachable from staged files.
      glob: "*.{ts,tsx}"
      run: pnpm exec vitest --changed --run

pre-push:
  commands:
    test:
      run: pnpm test
