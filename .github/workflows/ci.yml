name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  validate:
    name: typecheck • lint • format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check

  test:
    name: unit • integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nuansu
          POSTGRES_PASSWORD: nuansu_dev
          POSTGRES_DB: nuansu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test --coverage
        env:
          DATABASE_URL: postgres://nuansu:nuansu_dev@localhost:5432/nuansu_test
          DIRECT_DATABASE_URL: postgres://nuansu:nuansu_dev@localhost:5432/nuansu_test
          BETTER_AUTH_SECRET: ci_test_secret_at_least_32_bytes_xxxxxxxx
          LLM_PROVIDER: stub
          STRIPE_PROVIDER: stub
          EMAIL_PROVIDER: stub
          KMS_PROVIDER: stub

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: validate
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nuansu
          POSTGRES_PASSWORD: nuansu_dev
          POSTGRES_DB: nuansu_test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium webkit
        working-directory: apps/web
      - run: pnpm test:e2e
        env:
          DATABASE_URL: postgres://nuansu:nuansu_dev@localhost:5432/nuansu_test
          BETTER_AUTH_SECRET: ci_test_secret_at_least_32_bytes_xxxxxxxx
          LLM_PROVIDER: stub
          STRIPE_PROVIDER: stub
          EMAIL_PROVIDER: stub
          KMS_PROVIDER: stub

  bench:
    name: benchmarks (regression gate)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm bench

  bundle-size:
    name: bundle size budget
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @nuansu/web exec size-limit

  lighthouse:
    name: lighthouse (>= 90 on prerendered pages)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lighthouse
